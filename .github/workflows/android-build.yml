name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          SDK_ROOT=${ANDROID_HOME:-$ANDROID_SDK_ROOT}
          echo "SDK root: $SDK_ROOT"
          ls "$SDK_ROOT/"
          SDK_MGR=$(find "$SDK_ROOT" -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -z "$SDK_MGR" ]; then
            SDK_MGR=$(find /usr/local/lib/android -name sdkmanager -type f 2>/dev/null | head -1)
          fi
          echo "sdkmanager: $SDK_MGR"
          yes | "$SDK_MGR" --sdk_root="$SDK_ROOT" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: |
          SDK_ROOT=${ANDROID_HOME:-$ANDROID_SDK_ROOT}
          cd android
          echo "sdk.dir=$SDK_ROOT" > local.properties
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: malp-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: MALP build #${{ github.run_number }}
          body: |
            APK built from commit ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
