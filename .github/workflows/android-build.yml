name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT --licenses 2>/dev/null || true
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Build APK
        run: |
          cd android
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: malp-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' && success()
        with:
          tag_name: v${{ github.run_number }}
          name: MALP build #${{ github.run_number }}
          body: APK built from commit ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
